<!--
  Wazuh Agent Configuration — VM-WINSERV-01
  Agent:   VM-WINSERV-01 (192.168.1.10) — Primary Domain Controller
  Manager: Ubuntu 25 (192.168.1.xx)
  Domain:  InfoTech.com
-->

<ossec_config>

  <!-- ── Manager connection ───────────────────────────────────── -->
  <client>
    <server>
      <address>192.168.1.xx</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows, windows2022</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ── Agent buffer ─────────────────────────────────────────── -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ── File integrity monitoring ────────────────────────────── -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Critical Windows system paths -->
    <directories>%WINDIR%/System32</directories>
    <directories>%WINDIR%/SysWOW64</directories>
    <directories>%PROGRAMFILES%</directories>

    <!-- Ignore noisy temp directories -->
    <ignore>%WINDIR%/System32/LogFiles</ignore>
    <ignore>%WINDIR%/System32/wbem/Logs</ignore>
    <ignore>%WINDIR%/System32/GroupPolicy/Machine/Registry.pol</ignore>
  </syscheck>

  <!-- ── Log collection — Windows Event Channels ──────────────── -->

  <!-- Security Event Log — AD logins, lockouts, group changes, GPO events -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID != 4688 and EventID != 4703]</query>
  </localfile>

  <!-- System Event Log -->
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Application Event Log -->
  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows PowerShell Event Log -->
  <localfile>
    <location>Windows PowerShell</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Microsoft-Windows-PrintService/Operational -->
  <localfile>
    <location>Microsoft-Windows-PrintService/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ── Active response ──────────────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ── Logging ──────────────────────────────────────────────── -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>